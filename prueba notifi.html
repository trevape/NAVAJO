<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones PWA</title>

    <!-- Vinculo con el archivo PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7BA05B">

    <style>
        :root {
            --primary: #7BA05B;
            --bg-color: #121212;
            --card-bg: #1E1E1E;
            --text-main: #E0E0E0;
            --text-muted: #A0A0A0;
            --danger: #E63946;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 18px;
            padding: 28px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        h2 {
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 22px;
        }

        p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin: 10px 0 20px;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-secondary { background-color: transparent; color: var(--text-main); border: 1px solid rgba(255, 255, 255, 0.15); }
        .btn-install { background-color: #2A9D8F; color: white; display: none; }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--primary);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: left;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Prueba Notificaciones PWA</h2>
        <p>Sistema compatible con Chrome, Android y App instalada.</p>

        <div class="info-box" id="sw-status">
            Registrando Service Worker...
        </div>

        <div>
            Estado de Permisos:<br>
            <span id="status" class="status-badge">Comprobando...</span>
        </div>

        <div class="btn-group">
            <button id="btn-install" class="btn-install" onclick="instalarPWA()">📲 Instalar como Aplicación</button>
            <button class="btn-secondary" onclick="pedirPermisos()">1. Solicitar Permiso</button>
            <button class="btn-primary" onclick="enviarNotificacion()">2. Enviar Notificación de Prueba</button>
        </div>
    </div>

    <script>
        const statusElem = document.getElementById('status');
        const swStatusElem = document.getElementById('sw-status');
        const btnInstall = document.getElementById('btn-install');
        let swRegistration = null;
        let deferredPrompt = null;

        // 1. REGISTRO DEL SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        swRegistration = reg;
                        swStatusElem.innerHTML = "✅ Service Worker activo y listo";
                    })
                    .catch(err => {
                        swStatusElem.innerHTML = "❌ Error: Debe ejecutarse sobre HTTPS o Localhost";
                        console.error("SW error:", err);
                    });
            });
        }

        // 2. CAPTURAR EVENTO DE INSTALACIÓN PWA
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.style.display = 'block';
        });

        async function instalarPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    btnInstall.style.display = 'none';
                }
                deferredPrompt = null;
            }
        }

        // 3. CONTROL DE ESTADOS Y PERMISOS
        function actualizarEstado() {
            if (!("Notification" in window)) {
                statusElem.textContent = "No soportado ❌";
                statusElem.style.color = "var(--danger)";
                return;
            }

            const permiso = Notification.permission;
            if (permiso === "granted") {
                statusElem.textContent = "Permitido 🟢";
                statusElem.style.color = "var(--primary)";
            } else if (permiso === "denied") {
                statusElem.textContent = "Bloqueado 🔴";
                statusElem.style.color = "var(--danger)";
            } else {
                statusElem.textContent = "Pendiente 🟡";
                statusElem.style.color = "#E9C46A";
            }
        }

        async function pedirPermisos() {
            if (!("Notification" in window)) {
                alert("Navegador no compatible.");
                return;
            }

            if (Notification.permission === "denied") {
                alert("Las notificaciones están bloqueadas.\nDesbloquéalas tocando el candado 🔒 junto a la dirección Web.");
                return;
            }

            const permiso = await Notification.requestPermission();
            actualizarEstado();

            if (permiso === "granted") {
                enviarNotificacion();
            }
        }

        // 4. LANZAR NOTIFICACIÓN (Compatible con PWA e hilos en segundo plano)
        async function enviarNotificacion() {
            if (Notification.permission !== "granted") {
                alert("Primero debes otorga permisos pulsando '1. Solicitar Permiso'");
                return;
            }

            const titulo = "¡Notificación Funcional! 🔔";
            const opciones = {
                body: "Probando notificación en Android / Chrome / PWA.",
                icon: "https://cdn-icons-png.flaticon.com/512/1827/1827504.png",
                badge: "https://cdn-icons-png.flaticon.com/512/1827/1827504.png",
                vibrate: [100, 50, 100],
                data: { dateOfArrival: Date.now() }
            };

            // Usar el Service Worker (Método fiable para Android y PWA)
            if (swRegistration && swRegistration.active) {
                swRegistration.showNotification(titulo, opciones);
            } else {
                // Fallback clásico para escritorio
                new Notification(titulo, opciones);
            }
        }

        actualizarEstado();
    </script>
</body>
</html>
